<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>
    <link rel="stylesheet" href="register_student.css">
</head>
<body>
    <div class="container">
        <h1>Register Student</h1>
        <form id="registrationFormInneradmin" action="http://localhost:4665/register" method="POST"> 
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="form-group">
                <label for="matricNo">Matriculation Number:</label>
                <input type="text" id="matricNo" name="matricNo" required>
            </div>
            <div class="form-group">
                <label for="department">Department:</label>
                <input type="text" id="department" name="department" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="medicalQuestions">Medical Questions:</label>
                <textarea id="medicalQuestions" name="medicalQuestions" rows="4" required></textarea> 
            </div>
            <button type="submit">Register</button>
        </form>
        <footer class="footer">
            <p>&copy; 2025 School Medical Registration</p>
        </footer>
    </div>

    <script src="script.js"></script>
  
</body>
</html>
